name: BF-Intelligence CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  
  python-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Java 17 (Spark Desteği)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-mock pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8 
      run: |     
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run Unit Tests 
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest tests/ --cov=src --cov-report=xml

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-and-coverage-results
        path: |
          junit/test-results.xml
          coverage.xml

  
  docker-publish:
    runs-on: ubuntu-latest
    needs: python-tests 
    if: github.ref == 'refs/heads/main' 
    steps:
    - uses: actions/checkout@v4
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push
      uses: docker/build-push-action@v5
      with: 
        context: .
        file: ./infra/Dockerfile
        push: true
        tags: karakant1/bf-intelligence:latest, karakant1/bf-intelligence:${{ github.sha }}